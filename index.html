<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fff1f6">
  <title>甜心换装日记</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="game-shell">
    <!-- 首页 -->
    <section id="homePage" class="page home-page">
      <div class="home-card">
        <p class="eyebrow">DRESS UP H5</p>
        <h1>甜心换装日记</h1>
        <p class="home-description">
          自由组合上装和下装，或者换上一整套连衣裙。
        </p>
        <button id="startButton" class="primary-button" type="button">开始换装</button>
      </div>
    </section>

    <!-- 换装页 -->
    <section id="dressPage" class="page dress-page is-hidden">
      <header class="game-header">
        <button id="backButton" class="text-button" type="button">返回首页</button>
        <div>
          <p class="eyebrow">MY WARDROBE</p>
          <h2>甜心衣橱</h2>
        </div>
        <span class="header-placeholder" aria-hidden="true"></span>
      </header>

      <div class="dress-layout">
        <!-- 背景层与完整人物立绘层互相独立，不使用上装、下装图片图层。 -->
        <section class="character-panel" aria-label="角色预览">
          <div class="character-stage">
            <img
              id="bgImage"
              class="bg-layer"
              src="assets/bg/bg_01.png"
              alt=""
            >
            <img
              id="characterImage"
              class="character-layer"
              src="assets/character/base.png"
              alt="当前人物搭配"
            >
          </div>

          <div class="background-picker">
            <span>切换背景</span>
            <div id="backgroundOptions" class="background-options">
              <button
                class="background-button is-active"
                type="button"
                data-bg="assets/bg/bg_01.png"
                aria-label="切换到粉色卧室"
                aria-pressed="true"
              >
                <img src="assets/bg/bg_01.png" alt="">
              </button>
              <button
                class="background-button"
                type="button"
                data-bg="assets/bg/bg_02.png"
                aria-label="切换到樱花公园"
                aria-pressed="false"
              >
                <img src="assets/bg/bg_02.png" alt="">
              </button>
              <button
                class="background-button"
                type="button"
                data-bg="assets/bg/bg_03.png"
                aria-label="切换到水晶宫殿"
                aria-pressed="false"
              >
                <img src="assets/bg/bg_03.png" alt="">
              </button>
            </div>
          </div>

          <div class="current-selection" aria-live="polite">
            <p>上装：<strong id="currentTopText">未选择</strong></p>
            <p>下装：<strong id="currentBottomText">未选择</strong></p>
            <p>连衣裙：<strong id="currentDressText">未选择</strong></p>
          </div>
        </section>

        <!-- 服装选择区 -->
        <section class="wardrobe-panel" aria-label="服装选择">
          <div class="wardrobe-heading">
            <p class="eyebrow">CHOOSE YOUR LOOK</p>
            <h2>选择服装</h2>
            <p>上装和下装可以自由组合，连衣裙会替换整套搭配。</p>
          </div>

          <!-- 分类按钮只负责切换列表，不会改变当前穿搭。 -->
          <div class="category-tabs" role="tablist" aria-label="服装分类">
            <button
              class="category-button is-active"
              type="button"
              role="tab"
              data-category="top"
              aria-controls="topPanel"
              aria-selected="true"
            >上装</button>
            <button
              class="category-button"
              type="button"
              role="tab"
              data-category="bottom"
              aria-controls="bottomPanel"
              aria-selected="false"
            >下装</button>
            <button
              class="category-button"
              type="button"
              role="tab"
              data-category="dress"
              aria-controls="dressPanel"
              aria-selected="false"
            >连衣裙</button>
          </div>

          <section
            id="topPanel"
            class="clothes-section category-panel"
            data-category-panel="top"
            aria-labelledby="topTitle"
          >
            <h3 id="topTitle">上装</h3>
            <div id="topOptions" class="clothes-grid">
              <button
                class="clothes-card"
                type="button"
                data-type="top"
                data-id="top1"
                aria-label="选择粉色蝴蝶结上衣"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/top/top1_thumb.png" alt="">
                </span>
                <span>粉色蝴蝶结上衣</span>
              </button>

              <button
                class="clothes-card"
                type="button"
                data-type="top"
                data-id="top2"
                aria-label="选择蓝色学院风上衣"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/top/top2_thumb.png" alt="">
                </span>
                <span>蓝色学院风上衣</span>
              </button>

              <button
                class="clothes-card"
                type="button"
                data-type="top"
                data-id="top3"
                aria-label="选择粉色领结白衬衫"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/top/top3_thumb.png" alt="">
                </span>
                <span>粉色领结白衬衫</span>
              </button>
            </div>
          </section>

          <section
            id="bottomPanel"
            class="clothes-section category-panel is-hidden"
            data-category-panel="bottom"
            aria-labelledby="bottomTitle"
          >
            <h3 id="bottomTitle">下装</h3>
            <div id="bottomOptions" class="clothes-grid">
              <button
                class="clothes-card"
                type="button"
                data-type="bottom"
                data-id="bottom1"
                aria-label="选择百褶短裙"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/bottom/bottom1_thumb.png" alt="">
                </span>
                <span>百褶短裙</span>
              </button>

              <button
                class="clothes-card"
                type="button"
                data-type="bottom"
                data-id="bottom2"
                aria-label="选择奶油色短裤"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/bottom/bottom2_thumb.png" alt="">
                </span>
                <span>奶油色短裤</span>
              </button>

              <button
                class="clothes-card"
                type="button"
                data-type="bottom"
                data-id="bottom3"
                aria-label="选择深蓝通勤半身裙"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/bottom/bottom3_thumb.png" alt="">
                </span>
                <span>深蓝通勤半身裙</span>
              </button>
            </div>
          </section>

          <section
            id="dressPanel"
            class="clothes-section category-panel is-hidden"
            data-category-panel="dress"
            aria-labelledby="dressTitle"
          >
            <h3 id="dressTitle">连衣裙</h3>
            <div id="dressOptions" class="clothes-grid">
              <button
                class="clothes-card"
                type="button"
                data-type="dress"
                data-id="dress1"
                aria-label="选择甜心蝴蝶结连衣裙"
              >
                <span class="thumbnail-box">
                  <img src="assets/clothes/dress/dress1_thumb.png" alt="">
                </span>
                <span>甜心蝴蝶结连衣裙</span>
              </button>
            </div>
          </section>

          <div class="action-bar">
            <button id="clearButton" class="secondary-button" type="button">清空搭配</button>
            <button id="saveButton" class="secondary-button" type="button">保存搭配</button>
            <button id="loadButton" class="primary-button small" type="button">读取搭配</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <!-- 操作结果提示 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./main.js"></script>
</body>
</html>
